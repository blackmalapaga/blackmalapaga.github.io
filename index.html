<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eval Tokens · Fortnite matchmaker</title>
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0f0f0f;
            background-image: radial-gradient(circle at 20% 30%, #1a2a1a, #050505 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #2e7d32;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #1e4a22 inset;
            border-radius: 2.5rem;
            padding: 2.2rem 2.5rem;
            max-width: 1300px;
            width: 100%;
            transition: all 0.2s ease;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2.2rem;
            border-bottom: 2px solid #2e7d32;
            padding-bottom: 0.8rem;
        }

        .logo h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: white;
            text-shadow: 0 0 10px #2e7d32, 0 0 20px #1e4a22;
        }
        .logo span {
            color: #66bb6a;
            background: #1a2a1a;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-size: 1rem;
            margin-left: 10px;
            border: 1px solid #388e3c;
        }
        .token-badge {
            background: #1e2a1e;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #b9f6ca;
            border: 1px solid #388e3c;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .token-badge i {
            color: #66bb6a;
        }

        /* create match form */
        .create-section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 2.8rem;
            border: 1px solid #2a5e2a;
            box-shadow: 0 8px 0 #0a1a0a;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 1.5rem;
            align-items: flex-end;
        }

        .form-group {
            flex: 1 0 160px;
            min-width: 130px;
        }
        .form-group label {
            display: block;
            color: #b0d0b0;
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }
        .form-group input, 
        .form-group select {
            width: 100%;
            background: #1a1f1a;
            border: 1px solid #2e5a2e;
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        .form-group input:focus, 
        .form-group select:focus {
            border-color: #66bb6a;
            box-shadow: 0 0 0 2px #1e4a22;
        }
        .form-group input::placeholder {
            color: #6a7a6a;
            font-weight: 400;
        }

        .btn-create {
            background: #1e4a22;
            border: none;
            border-radius: 60px;
            padding: 0.7rem 2.2rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid #388e3c;
            box-shadow: 0 4px 0 #0a2a0a;
            flex: 0 0 auto;
            margin-left: auto;
        }
        .btn-create i {
            color: #a5d6a7;
        }
        .btn-create:hover {
            background: #2e6a32;
            transform: scale(1.01);
            border-color: #66bb6a;
            box-shadow: 0 6px 0 #0a2a0a;
        }
        .btn-create:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0a2a0a;
        }

        /* match list */
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            color: #c8e6c9;
            flex-wrap: wrap;
        }
        .match-header h2 {
            font-weight: 600;
            font-size: 1.7rem;
            color: white;
            letter-spacing: -0.3px;
        }
        .match-header h2 i {
            color: #66bb6a;
            margin-right: 10px;
        }
        .match-count {
            background: #1e2e1e;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            border: 1px solid #2e7d32;
            font-size: 0.9rem;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        .match-card {
            background: rgba(10, 20, 10, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid #2a5e2a;
            border-radius: 2rem;
            padding: 1.5rem 1.2rem 1.2rem;
            transition: 0.15s ease;
            box-shadow: 0 6px 0 #0a1a0a;
            display: flex;
            flex-direction: column;
        }
        .match-card:hover {
            border-color: #4caf50;
            box-shadow: 0 8px 0 #0a1a0a, 0 0 10px #1e4a22;
            transform: translateY(-3px);
        }

        .match-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .match-title .mode-badge {
            background: #1e3a1e;
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            color: #a5d6a7;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border: 1px solid #2e7d32;
        }
        .match-title .token-pot {
            background: #0f2a0f;
            border-radius: 30px;
            padding: 0.2rem 0.9rem;
            color: #b9f6ca;
            font-weight: 700;
            font-size: 0.9rem;
            border: 1px solid #388e3c;
        }
        .match-title .token-pot i {
            margin-right: 4px;
            color: #66bb6a;
        }

        .match-details {
            margin: 0.5rem 0 0.8rem;
            color: #cfdfcf;
            font-size: 0.95rem;
            line-height: 1.6;
            flex: 1;
        }
        .match-details i {
            width: 20px;
            color: #66bb6a;
        }
        .match-details .entry-fee {
            background: #1a2a1a;
            display: inline-block;
            padding: 0.1rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #2e7d32;
            font-weight: 600;
            color: #b9f6ca;
            margin-top: 4px;
        }
        .fortnite-user {
            background: #111e11;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            border: 1px solid #2a5a2a;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #c8e6c9;
            margin-top: 6px;
        }
        .fortnite-user i {
            color: #81c784;
        }

        .match-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1e3a1e;
            padding-top: 0.8rem;
            margin-top: 0.7rem;
            color: #8aaa8a;
            font-size: 0.8rem;
        }
        .match-footer .status {
            color: #a5d6a7;
            background: #0f2a0f;
            padding: 0.1rem 0.9rem;
            border-radius: 30px;
            border: 1px solid #2e7d32;
        }
        .match-footer .status i {
            margin-right: 4px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #6a8a6a;
            padding: 2.5rem 0;
            font-size: 1.1rem;
            border: 1px dashed #2a5a2a;
            border-radius: 3rem;
            background: rgba(0, 0, 0, 0.2);
        }
        .empty-state i {
            font-size: 2.2rem;
            color: #2e7d32;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* responsive */
        @media (max-width: 650px) {
            .glass-card { padding: 1.5rem; }
            .form-row { flex-direction: column; align-items: stretch; }
            .btn-create { margin-left: 0; justify-content: center; }
            .logo h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="glass-card" id="app">
        <!-- header -->
        <div class="header">
            <div class="logo">
                <h1>🎯 Eval Tokens <span>beta</span></h1>
            </div>
            <div class="token-badge">
                <i class="fas fa-coins"></i> token pool: <span id="totalTokenDisplay">0.00</span>
            </div>
        </div>

        <!-- create match -->
        <div class="create-section">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user-friends"></i> format</label>
                    <select id="matchType">
                        <option value="1v1">1v1</option>
                        <option value="2v2" selected>2v2</option>
                        <option value="3v3">3v3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-ticket-alt"></i> entry fee (tokens)</label>
                    <input type="number" id="entryFee" placeholder="e.g. 0.50" step="0.01" min="0.01" value="0.50">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label><i class="fas fa-user"></i> your fortnite user</label>
                    <input type="text" id="fortniteUser" placeholder="Epic display name..." value="Vortex_77">
                </div>
                <button class="btn-create" id="createMatchBtn"><i class="fas fa-plus-circle"></i> create match</button>
            </div>
            <div style="margin-top: 0.6rem; font-size: 0.8rem; color: #5a7a5a; display: flex; gap: 16px; flex-wrap: wrap;">
                <span><i class="fas fa-info-circle" style="color: #388e3c;"></i> winner gets 0.50 from both duos (2v2)</span>
                <span><i class="fas fa-coins" style="color: #66bb6a;"></i> tokens are locked in the match</span>
            </div>
        </div>

        <!-- match list -->
        <div class="match-header">
            <h2><i class="fas fa-gamepad"></i> live matches</h2>
            <span class="match-count" id="matchCount">0 matches</span>
        </div>

        <div class="match-grid" id="matchGrid">
            <!-- dynamic cards injected here -->
            <div class="empty-state">
                <i class="fas fa-ghost"></i>
                <span>no matches yet — create one above</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- state ----------
            let matches = [];  // each: { id, type, entryFee, creator, createdAt, status }

            // DOM refs
            const matchGrid = document.getElementById('matchGrid');
            const matchCount = document.getElementById('matchCount');
            const totalTokenDisplay = document.getElementById('totalTokenDisplay');

            const matchType = document.getElementById('matchType');
            const entryFee = document.getElementById('entryFee');
            const fortniteUser = document.getElementById('fortniteUser');
            const createBtn = document.getElementById('createMatchBtn');

            // helpers
            function formatToken(val) {
                return Number(val).toFixed(2);
            }

            function updateStats() {
                // total token pool = sum of entryFee * 2 (because each player pays entry, but we display as "pot" per match)
                // for simplicity: total tokens = sum of all entry fees * 2 (as if both sides pay)
                // but we want to show "token pool" as total tokens in all matches
                let total = 0;
                matches.forEach(m => {
                    total += m.entryFee * 2;  // both sides contribute
                });
                totalTokenDisplay.textContent = formatToken(total);

                // match count
                matchCount.textContent = matches.length + ' match' + (matches.length !== 1 ? 'es' : '');
            }

            function renderMatches() {
                if (matches.length === 0) {
                    matchGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-ghost"></i>
                            <span>no matches yet — create one above</span>
                        </div>
                    `;
                    updateStats();
                    return;
                }

                let html = '';
                matches.forEach((match, index) => {
                    // determine mode label
                    const modeLabel = match.type.toUpperCase();
                    // entry fee per player
                    const fee = formatToken(match.entryFee);
                    // total pot = fee * 2 (for 2 players) but we show as "pot"
                    const pot = formatToken(match.entryFee * 2);

                    // fortnite user: use the creator's name, or fallback
                    const user = match.creator || 'unknown';

                    html += `
                        <div class="match-card" data-id="${match.id}">
                            <div class="match-title">
                                <span class="mode-badge"><i class="fas fa-crosshairs"></i> ${modeLabel}</span>
                                <span class="token-pot"><i class="fas fa-coins"></i> ${pot}</span>
                            </div>
                            <div class="match-details">
                                <div><i class="fas fa-user"></i> creator: <strong style="color:white;">${user}</strong></div>
                                <div style="display:flex; flex-wrap:wrap; gap: 6px 12px; margin-top: 4px;">
                                    <span><i class="fas fa-ticket-alt"></i> entry: <span class="entry-fee">${fee} tokens</span></span>
                                    <span><i class="fas fa-trophy"></i> winner takes ${pot}</span>
                                </div>
                                <div class="fortnite-user">
                                    <i class="fab fa-fort-awesome"></i> ${user}
                                </div>
                            </div>
                            <div class="match-footer">
                                <span><i class="far fa-clock"></i> ${new Date(match.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                <span class="status"><i class="fas fa-circle" style="color: #66bb6a; font-size: 0.6rem;"></i> open</span>
                            </div>
                        </div>
                    `;
                });

                matchGrid.innerHTML = html;
                updateStats();
            }

            // create match
            function createMatch() {
                // get values
                const type = matchType.value;
                let fee = parseFloat(entryFee.value);
                if (isNaN(fee) || fee <= 0) {
                    alert('Please enter a valid entry fee (e.g. 0.50)');
                    return;
                }
                // cap to 2 decimals
                fee = Math.round(fee * 100) / 100;

                let user = fortniteUser.value.trim();
                if (user === '') {
                    alert('Please enter your Fortnite user name.');
                    return;
                }

                // build match object
                const newMatch = {
                    id: Date.now() + '_' + Math.random().toString(36).substring(2, 6),
                    type: type,
                    entryFee: fee,
                    creator: user,
                    createdAt: Date.now(),
                    status: 'open'
                };

                matches.unshift(newMatch); // newest first
                renderMatches();

                // optional: reset fee to default but keep user
                // we don't reset user, but we can set fee back to 0.50 as placeholder
                // but it's fine to keep last value.
                // just a tiny UX: set fee to 0.50 if it was empty
                if (entryFee.value === '' || parseFloat(entryFee.value) <= 0) {
                    entryFee.value = '0.50';
                }
                // keep user as is
            }

            // event listeners
            createBtn.addEventListener('click', createMatch);

            // enter key on any input
            document.querySelectorAll('#matchType, #entryFee, #fortniteUser').forEach(el => {
                el.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        createMatch();
                    }
                });
            });

            // seed with two example matches (so UI looks alive)
            function seedMatches() {
                const now = Date.now();
                matches = [
                    {
                        id: 'seed1',
                        type: '2v2',
                        entryFee: 0.50,
                        creator: 'Ninja_Elite',
                        createdAt: now - 120000,
                        status: 'open'
                    },
                    {
                        id: 'seed2',
                        type: '1v1',
                        entryFee: 1.25,
                        creator: 'SniperWolf',
                        createdAt: now - 350000,
                        status: 'open'
                    },
                    {
                        id: 'seed3',
                        type: '3v3',
                        entryFee: 0.75,
                        creator: 'Bugha_22',
                        createdAt: now - 700000,
                        status: 'open'
                    }
                ];
                renderMatches();
            }

            // initial seed
            seedMatches();

            // also set default user if empty
            if (fortniteUser.value === '') {
                fortniteUser.value = 'Vortex_77';
            }

            // extra: if entry fee empty, set default
            if (entryFee.value === '') {
                entryFee.value = '0.50';
            }

            // expose for debugging
            window.__matches = matches;
        })();
    </script>
</body>
</html>
