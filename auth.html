<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Tokens · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at 10% 20%, #1a0505 0%, #0a0a0a 90%);
      padding: 20px;
    }
    .auth-container {
      max-width: 480px;
      width: 100%;
      background: #111111;
      border-radius: 32px;
      padding: 2.5rem;
      border: 1px solid #1f1f1f;
      box-shadow: 0 12px 60px rgba(0,0,0,0.8);
    }
    .auth-container:hover { border-color: #e11d1d; }
    .text-red { color: #e11d1d; }
    .btn-red {
      background: #e11d1d;
      color: #fff;
      font-weight: 700;
      padding: 0.8rem;
      border-radius: 60px;
      border: none;
      transition: 0.2s;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }
    .btn-red:hover { background: #ff2a2a; transform: scale(1.02); }
    .btn-red:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline-red {
      background: transparent;
      color: #e11d1d;
      border: 1.5px solid #e11d1d;
      padding: 0.8rem;
      border-radius: 60px;
      font-weight: 600;
      transition: 0.2s;
      cursor: pointer;
      width: 100%;
    }
    .btn-outline-red:hover { background: #e11d1d; color: #fff; }
    .input-field {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 60px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      font-size: 1rem;
      transition: 0.2s;
    }
    .input-field:focus { outline: none; border-color: #e11d1d; }
    .brand-font { font-family: 'Orbitron', monospace; letter-spacing: 0.5px; }
    .flex-center { display: flex; align-items: center; gap: 0.6rem; }
    .gap-1 { gap: 1rem; }
    .text-muted { color: #9a9a9a; }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      color: #555; font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #222;
    }
    .toggle-form {
      color: #e11d1d;
      cursor: pointer;
      text-decoration: underline;
    }
    .toggle-form:hover { color: #ff2a2a; }
    .error-msg {
      color: #e11d1d;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
      padding: 10px;
      background: #1a0505;
      border-radius: 12px;
      border: 1px solid #2a0a0a;
    }
    .success-msg {
      color: #4ade80;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
      padding: 10px;
      background: #051a05;
      border-radius: 12px;
      border: 1px solid #0a2a0a;
    }
    .info-msg {
      color: #60a5fa;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      text-align: center;
      padding: 10px;
      background: #0a0a2a;
      border-radius: 12px;
      border: 1px solid #1a1a4a;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="auth-container">
  <!-- Brand -->
  <div class="flex-center" style="justify-content:center; margin-bottom:1.5rem;">
    <i class="fas fa-bolt" style="color:#e11d1d; font-size: 2rem;"></i>
    <span class="brand-font" style="font-weight: 900; font-size: 1.8rem; color:#fff;">ELITE<span style="color:#e11d1d;">.</span>TOKENS</span>
  </div>

  <h2 style="text-align:center; font-weight:700; margin-bottom:0.3rem;" id="formTitle">Create account</h2>
  <p style="text-align:center; color:#9a9a9a; margin-bottom:1.5rem;" id="formSubtitle">Join the Elite Tokens community</p>

  <!-- Social Auth -->
  <button class="btn-outline-red" style="margin-bottom:0.6rem;" onclick="authWithDiscord()"><i class="fab fa-discord"></i> Continue with Discord</button>
  <button class="btn-outline-red" style="margin-bottom:1.2rem;" onclick="authWithGoogle()"><i class="fab fa-google"></i> Continue with Google</button>

  <div class="divider">or</div>

  <!-- Form -->
  <form id="authForm" style="margin-top:1.2rem;" onsubmit="handleAuth(event)">
    <input type="email" id="email" placeholder="Email address" class="input-field" style="margin-bottom:0.8rem;" required />
    <input type="password" id="password" placeholder="Password" class="input-field" style="margin-bottom:0.8rem;" required minlength="6" />
    <input type="text" id="username" placeholder="Username" class="input-field" style="margin-bottom:0.8rem;" />
    
    <div class="flex-center" style="justify-content:space-between; margin-bottom:1.2rem;">
      <label><input type="checkbox" id="rememberMe" /> Remember me</label>
      <a href="#" style="color:#e11d1d; text-decoration:none; font-size:0.9rem;" onclick="forgotPassword()">Forgot password?</a>
    </div>
    
    <button type="submit" class="btn-red" id="submitBtn">Sign Up</button>
  </form>

  <p style="text-align:center; margin-top:1rem; color:#9a9a9a;" id="toggleText">
    Already have an account? <span class="toggle-form" onclick="toggleAuthMode()">Sign in</span>
  </p>

  <div id="message"></div>

  <!-- 2FA placeholder -->
  <div style="margin-top:1.2rem; padding:0.8rem; background:#0d0d0d; border-radius:16px; border:1px solid #1f1f1f;">
    <div class="flex-center" style="justify-content:center; gap:0.8rem;">
      <i class="fas fa-shield-alt" style="color:#e11d1d;"></i>
      <span class="text-muted" style="font-size:0.85rem;">Two-factor authentication available</span>
    </div>
  </div>
</div>

<script>
  // ===== SUPABASE CONFIG =====
  const SUPABASE_URL = 'https://kjpjopcxagdvnzhgijvg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_5ko2Wr62diplPRl5VSlrEw_O601WowO';

  let isLoginMode = false; // Start in signup mode

  function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    const title = document.getElementById('formTitle');
    const subtitle = document.getElementById('formSubtitle');
    const submitBtn = document.getElementById('submitBtn');
    const toggleText = document.getElementById('toggleText');
    const usernameField = document.getElementById('username');
    const forgotLink = document.querySelector('a[onclick="forgotPassword()"]');
    
    if (isLoginMode) {
      title.textContent = 'Welcome back';
      subtitle.textContent = 'Sign in to your account';
      submitBtn.textContent = 'Sign In';
      toggleText.innerHTML = `Don't have an account? <span class="toggle-form" onclick="toggleAuthMode()">Sign up</span>`;
      usernameField.style.display = 'none';
      usernameField.required = false;
      forgotLink.style.display = 'block';
    } else {
      title.textContent = 'Create account';
      subtitle.textContent = 'Join the Elite Tokens community';
      submitBtn.textContent = 'Sign Up';
      toggleText.innerHTML = `Already have an account? <span class="toggle-form" onclick="toggleAuthMode()">Sign in</span>`;
      usernameField.style.display = 'block';
      usernameField.required = true;
      forgotLink.style.display = 'none';
    }
    document.getElementById('message').innerHTML = '';
  }

  async function handleAuth(event) {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value;
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Processing...';

    try {
      if (isLoginMode) {
        // ===== LOGIN =====
        const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            email: email.trim(), 
            password: password 
          })
        });

        const data = await response.json();

        if (data.error) {
          messageEl.innerHTML = `<div class="error-msg">❌ ${data.error.message}</div>`;
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign In';
          return;
        }

        // Save token
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Get user profile from users table
        const userRes = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${encodeURIComponent(email)}`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${data.access_token}`
          }
        });
        const userData = await userRes.json();
        
        if (userData && userData.length > 0) {
          localStorage.setItem('userData', JSON.stringify(userData[0]));
        }

        messageEl.innerHTML = `<div class="success-msg">✅ Login successful! Redirecting...</div>`;
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);

      } else {
        // ===== REGISTER =====
        if (!username || username.trim() === '') {
          messageEl.innerHTML = `<div class="error-msg">❌ Please enter a username</div>`;
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign Up';
          return;
        }

        // First create auth user
        const signupResponse = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            email: email.trim(), 
            password: password,
            data: { username: username.trim() }
          })
        });

        const signupData = await signupResponse.json();

        if (signupData.error) {
          messageEl.innerHTML = `<div class="error-msg">❌ ${signupData.error.message}</div>`;
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign Up';
          return;
        }

        // Create user profile in users table
        const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${signupData.access_token}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            id: signupData.user.id,
            username: username.trim(),
            email: email.trim(),
            token_balance: 0,
            total_earned: 0,
            total_wins: 0,
            total_losses: 0,
            is_admin: false
          })
        });

        const profileResult = await profileResponse.json();

        if (profileResponse.status !== 201 && profileResponse.status !== 200) {
          console.error('Profile creation error:', profileResult);
          messageEl.innerHTML = `<div class="error-msg">❌ Account created but profile setup failed. Please contact support.</div>`;
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Sign Up';
          return;
        }

        messageEl.innerHTML = `<div class="success-msg">✅ Account created! Redirecting...</div>`;
        localStorage.setItem('token', signupData.access_token);
        localStorage.setItem('user', JSON.stringify(signupData.user));
        localStorage.setItem('userData', JSON.stringify(profileResult[0] || { username: username.trim() }));

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      }
    } catch (error) {
      console.error('Auth error:', error);
      messageEl.innerHTML = `<div class="error-msg">❌ Network error: ${error.message}. Please check your connection and try again.</div>`;
      submitBtn.disabled = false;
      submitBtn.innerHTML = isLoginMode ? 'Sign In' : 'Sign Up';
    }
  }

  function authWithDiscord() {
    // Redirect to Discord OAuth
    const redirectUrl = encodeURIComponent(window.location.origin + '/auth-callback.html');
    window.location.href = `https://kjpjopcxagdvnzhgijvg.supabase.co/auth/v1/authorize?provider=discord&redirect_to=${redirectUrl}`;
  }

  function authWithGoogle() {
    const redirectUrl = encodeURIComponent(window.location.origin + '/auth-callback.html');
    window.location.href = `https://kjpjopcxagdvnzhgijvg.supabase.co/auth/v1/authorize?provider=google&redirect_to=${redirectUrl}`;
  }

  function forgotPassword() {
    const email = document.getElementById('email').value;
    if (!email) {
      document.getElementById('message').innerHTML = `<div class="error-msg">❌ Please enter your email address</div>`;
      return;
    }
    
    fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email })
    })
    .then(res => res.json())
    .then(data => {
      document.getElementById('message').innerHTML = `<div class="success-msg">✅ Password reset email sent! Check your inbox.</div>`;
    })
    .catch(() => {
      document.getElementById('message').innerHTML = `<div class="error-msg">❌ Error sending reset email. Please try again.</div>`;
    });
  }

  // Check if already logged in
  const token = localStorage.getItem('token');
  if (token) {
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
