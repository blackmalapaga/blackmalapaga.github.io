<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:white;
    text-align:center;
}

.card {
    background:#141414;
    padding:30px;
    width:320px;
    margin:60px auto;
    border-radius:10px;
}

img {
    width:70px;
    border-radius:50%;
}
</style>
</head>

<body>

<h1>Dashboard</h1>

<div class="card">
    <p id="status">Loading...</p>

    <img id="avatar" style="display:none;">
    <h3 id="name"></h3>

    <br>

    <a href="https://drive.google.com/your-link" target="_blank">Download EvalOS</a>
    <br><br>
    <a href="https://discord.gg/pFHrbTwTQA" target="_blank">Discord Support</a>
    <br><br>

    <button onclick="logout()">Logout</button>
</div>

<script>
const supabase = window.supabase.createClient(
    "https://rgdkdflkviigwdtuodjy.supabase.co",
    "sb_publishable_g6SPFSeUGkLQiwcwDegpuw_HDihXvip"
);

// 🔥 FIX 1: handle OAuth callback properly
async function handleAuth() {
    const url = new URL(window.location.href);

    if (url.searchParams.get("code")) {
        await supabase.auth.exchangeCodeForSession(window.location.href);
        window.history.replaceState({}, document.title, "/dashboard/");
    }

    const { data: { session } } = await supabase.auth.getSession();

    if (!session?.user) {
        window.location.href = "/";
        return;
    }

    document.getElementById("status").style.display = "none";

    document.getElementById("name").innerText =
        session.user.user_metadata?.full_name ||
        session.user.email;

    document.getElementById("avatar").src =
        session.user.user_metadata?.avatar_url || "";

    document.getElementById("avatar").style.display = "block";
}

// logout
async function logout() {
    await supabase.auth.signOut();
    window.location.href = "/";
}

handleAuth();
</script>

</body>
</html>
