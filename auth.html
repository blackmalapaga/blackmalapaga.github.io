<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Tokens · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle at 10% 20%, #1a0505 0%, #0a0a0a 90%);
    }
    .auth-container {
      max-width: 480px;
      width: 100%;
      background: #111111;
      border-radius: 32px;
      padding: 2.5rem;
      border: 1px solid #1f1f1f;
      box-shadow: 0 12px 60px rgba(0,0,0,0.8);
    }
    .auth-container:hover { border-color: #e11d1d; }
    .text-red { color: #e11d1d; }
    .btn-red {
      background: #e11d1d;
      color: #fff;
      font-weight: 700;
      padding: 0.8rem;
      border-radius: 60px;
      border: none;
      transition: 0.2s;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }
    .btn-red:hover { background: #ff2a2a; transform: scale(1.02); }
    .btn-outline-red {
      background: transparent;
      color: #e11d1d;
      border: 1.5px solid #e11d1d;
      padding: 0.8rem;
      border-radius: 60px;
      font-weight: 600;
      transition: 0.2s;
      cursor: pointer;
      width: 100%;
    }
    .btn-outline-red:hover { background: #e11d1d; color: #fff; }
    .input-field {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 60px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      font-size: 1rem;
      transition: 0.2s;
    }
    .input-field:focus { outline: none; border-color: #e11d1d; }
    .brand-font { font-family: 'Orbitron', monospace; letter-spacing: 0.5px; }
    .flex-center { display: flex; align-items: center; gap: 0.6rem; }
    .gap-1 { gap: 1rem; }
    .text-muted { color: #9a9a9a; }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      color: #555; font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #222;
    }
  </style>
</head>
<body>
<div class="auth-container">
  <!-- Brand -->
  <div class="flex-center" style="justify-content:center; margin-bottom:1.5rem;">
    <i class="fas fa-bolt" style="color:#e11d1d; font-size: 2rem;"></i>
    <span class="brand-font" style="font-weight: 900; font-size: 1.8rem; color:#fff;">ELITE<span style="color:#e11d1d;">.</span>TOKENS</span>
  </div>

  <h2 style="text-align:center; font-weight:700; margin-bottom:0.3rem;">Welcome back</h2>
  <p style="text-align:center; color:#9a9a9a; margin-bottom:1.5rem;">Sign in to your account</p>

  <!-- Social Auth -->
  <button class="btn-outline-red" style="margin-bottom:0.6rem;"><i class="fab fa-discord"></i> Continue with Discord</button>
  <button class="btn-outline-red" style="margin-bottom:1.2rem;"><i class="fab fa-google"></i> Continue with Google</button>

  <div class="divider">or</div>

  <!-- Form -->
  <form style="margin-top:1.2rem;">
    <input type="email" placeholder="Email address" class="input-field" style="margin-bottom:0.8rem;" />
    <input type="password" placeholder="Password" class="input-field" style="margin-bottom:0.8rem;" />
    <div class="flex-center" style="justify-content:space-between; margin-bottom:1.2rem;">
      <label><input type="checkbox" /> Remember me</label>
      <a href="#" style="color:#e11d1d; text-decoration:none; font-size:0.9rem;">Forgot password?</a>
    </div>
    <button class="btn-red">Sign In</button>
  </form>

  <p style="text-align:center; margin-top:1rem; color:#9a9a9a;">
    Don't have an account? <a href="#" style="color:#e11d1d; text-decoration:none;">Sign up</a>
  </p>

  <!-- 2FA placeholder -->
  <div style="margin-top:1.2rem; padding:0.8rem; background:#0d0d0d; border-radius:16px; border:1px solid #1f1f1f;">
    <div class="flex-center" style="justify-content:center; gap:0.8rem;">
      <i class="fas fa-shield-alt" style="color:#e11d1d;"></i>
      <span class="text-muted" style="font-size:0.85rem;">Two-factor authentication available</span>
    </div>
  </div>

  <p style="text-align:center; margin-top:1rem; font-size:0.75rem; color:#555;">
    By continuing you agree to our Terms & Privacy Policy
  </p>
</div>
</body>
</html>
