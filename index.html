<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Tweaks | Pro Performance</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap');

:root {
    --bg:#0a0a0a;
    --card:#141414;
    --accent:#ff0000;
    --text:#fff;
}

body {
    margin:0;
    font-family:Inter;
    background:var(--bg);
    color:var(--text);
}

.hero {
    padding:80px 20px;
    text-align:center;
    background:radial-gradient(circle,#1a0000,#0a0a0a);
}

h1 { font-size:3.5rem; }
.accent { color:var(--accent); }

.button-group {
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:30px;
}

.btn {
    padding:16px 28px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:800;
    text-decoration:none;
}

.red { background:var(--accent); color:white; }
.gray { background:#333; color:white; }

.discord-login {
    position:absolute;
    top:20px;
    right:20px;
    background:#5865F2;
    color:white;
    padding:10px 18px;
    border-radius:20px;
    border:none;
    cursor:pointer;
}

.container {
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card {
    background:var(--card);
    padding:40px;
    border:1px solid #333;
    border-radius:10px;
    text-align:center;
}

.price {
    font-size:1.8rem;
    color:var(--accent);
    font-weight:800;
}
</style>
</head>

<body>

<!-- LOGIN -->
<button class="discord-login" onclick="login()">
    <i class="fab fa-discord"></i> Login
</button>

<!-- HERO -->
<section class="hero">
    <h1>EVAL <span class="accent">TWEAKS</span></h1>
    <p>Optimiza tu PC. Domina el juego.</p>

    <div class="button-group">
        <a class="btn red" href="https://drive.usercontent.google.com/download?id=1x-f6slTyjTuq1soC0Qd2i-3MM7GfRDI6&export=download&authuser=0&confirm=t&uuid=a893661d-d6c0-4735-8067-8c15e7728f53&at=AAINaIID-vws_-0HaoZL-1IUw7RO:1782004859906" target="_blank">
            DESCARGAR EVALOS
        </a>

        <a class="btn gray" href="https://discord.gg/pFHrbTwTQA" target="_blank">
            DISCORD
        </a>

        <a class="btn gray" href="/dashboard/">
            DASHBOARD
        </a>
    </div>
</section>

<!-- CARDS -->
<div class="container">
    <div class="grid">

        <div class="card">
            <h2>EvalOS</h2>
            <div class="price">FREE</div>
            <p>Optimización básica del sistema</p>
        </div>

        <div class="card">
            <h2>Utilidad Monthly</h2>
            <div class="price">$45 / month</div>
            <p>Acceso completo + soporte</p>
        </div>

        <div class="card">
            <h2>Lifetime</h2>
            <div class="price">$75</div>
            <p>Pago único de por vida</p>
        </div>

    </div>
</div>

<script>
const sb = supabase.createClient(
    "https://rgdkdflkviigwdtuodjy.supabase.co",
    "sb_publishable_g6SPFSeUGkLQiwcwDegpuw_HDihXvip"
);

// LOGIN DISCORD (FIXED)
async function login() {
    const { error } = await sb.auth.signInWithOAuth({
        provider: "discord",
        options: {
            redirectTo: "https://evaltweaks.com/dashboard/"
        }
    });

    if (error) alert(error.message);
}
</script>

</body>
</html>
