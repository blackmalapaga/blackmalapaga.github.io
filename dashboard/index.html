<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard | Eval Tweaks</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin:0;
    font-family:Inter;
    background:#0a0a0a;
    color:white;
    text-align:center;
}

.card {
    background:#141414;
    width:350px;
    margin:60px auto;
    padding:30px;
    border-radius:10px;
    border:1px solid #333;
}

img {
    width:80px;
    border-radius:50%;
    margin-bottom:10px;
}

.btn {
    padding:12px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:800;
    margin:6px;
    text-decoration:none;
}

.red { background:red; color:white; }
.gray { background:#333; color:white; }
.blue { background:#5865F2; color:white; }
</style>
</head>

<body>

<h1>Dashboard</h1>

<div class="card">
    <p id="status">Loading...</p>

    <img id="avatar" style="display:none;">
    <h3 id="name"></h3>

    <br>

    <a class="btn red" href="https://drive.usercontent.google.com/download?id=1x-f6slTyjTuq1soC0Qd2i-3MM7GfRDI6&export=download&authuser=0&confirm=t&uuid=a893661d-d6c0-4735-8067-8c15e7728f53&at=AAINaIID-vws_-0HaoZL-1IUw7RO:1782004859906" target="_blank">
        Download EvalOS
    </a>

    <a class="btn blue" href="https://discord.gg/pFHrbTwTQA" target="_blank">
        Discord Support
    </a>

    <br><br>

    <button class="btn gray" onclick="logout()">Logout</button>
</div>

<script>
const sb = supabase.createClient(
    "https://rgdkdflkviigwdtuodjy.supabase.co",
    "YOUR_ANON_KEY"
);

async function load() {

    // FIX OAuth callback
    const url = new URL(window.location.href);

    if (url.searchParams.get("code")) {
        await sb.auth.exchangeCodeForSession(window.location.href);
        window.history.replaceState({}, document.title, "/dashboard/");
    }

    const { data: { session } } = await sb.auth.getSession();

    // NOT LOGGED IN
    if (!session?.user) {
        window.location.href = "/";
        return;
    }

    // DISCORD ONLY CHECK
    if (session.user.app_metadata?.provider !== "discord") {
        alert("Discord login only");
        await sb.auth.signOut();
        window.location.href = "/";
        return;
    }

    document.getElementById("status").style.display = "none";

    document.getElementById("name").innerText =
        session.user.user_metadata?.full_name ||
        session.user.email;

    document.getElementById("avatar").src =
        session.user.user_metadata?.avatar_url || "";

    document.getElementById("avatar").style.display = "block";
}

// LOGOUT
async function logout() {
    await sb.auth.signOut();
    window.location.href = "/";
}

load();
</script>

</body>
</html>
