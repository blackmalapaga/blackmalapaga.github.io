<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eval Tweaks | Pro Performance | FIXED</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap');

        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #ff0000;
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(circle, #1a0000, #0a0a0a);
        }

        h1 {
            font-size: 3rem;
        }

        .accent {
            color: var(--accent);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }

        .btn-red {
            background: var(--accent);
            color: white;
        }

        .btn-gray {
            background: #333;
            color: white;
        }

        .discord-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #5865F2;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
        }

        #dashboard {
            display: none;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }

        #avatar {
            width: 60px;
            border-radius: 50%;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
        }

        .price {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<button class="discord-btn" onclick="loginDiscord()">
    <i class="fab fa-discord"></i> Login
</button>

<div id="dashboard">
    <img id="avatar">
    <h3>Bienvenido <span id="name"></span></h3>
    <button class="btn btn-gray" onclick="logout()">Cerrar sesión</button>
</div>

<!-- HERO -->
<section class="hero">
    <h1>EVAL <span class="accent">TWEAKS</span></h1>
    <p>Optimiza tu PC. Domina el juego.</p>

    <a class="btn btn-red"
       href="https://drive.usercontent.google.com/download?id=1x-f6slTyjTuq1soC0Qd2i-3MM7GfRDI6&export=download&authuser=0&confirm=t&uuid=a893661d-d6c0-4735-8067-8c15e7728f53&at=AAINaIID-vws_-0HaoZL-1IUw7RO:1782004859906"
       target="_blank">
        DESCARGAR EVAL-OS
    </a>

    <a class="btn btn-gray"
       href="https://discord.gg/pFHrbTwTQA"
       target="_blank">
        DISCORD
    </a>
</section>

<!-- CARDS -->
<div class="container">
    <div class="grid">

        <div class="card">
            <h2>EvalOS</h2>
            <p class="price">FREE</p>
            <p>Optimización básica del sistema</p>
        </div>

        <div class="card">
            <h2>Utilidad Monthly</h2>
            <p class="price">$45 / mes</p>
            <p>Acceso completo + soporte</p>
        </div>

        <div class="card">
            <h2>Lifetime</h2>
            <p class="price">$75</p>
            <p>Pago único de por vida</p>
        </div>

    </div>
</div>

<script>
    // ===================== SUPABASE =====================
    const SUPABASE_URL = "https://rgdkdflkviigwdtuodjy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_g6SPFSeUGkLQiwcwDegpuw_HDihXvip";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
            flowType: 'pkce',
            detectSessionInUrl: true,
            persistSession: true
        }
    });

    // ===================== UI =====================
    function showUser(user) {
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("name").innerText =
            user.user_metadata?.full_name ||
            user.email;

        document.getElementById("avatar").src =
            user.user_metadata?.avatar_url || "";
    }

    // ===================== LOGIN =====================
    async function loginDiscord() {
        await sb.auth.signInWithOAuth({
            provider: "discord",
            options: {
                redirectTo: window.location.origin
            }
        });
    }

    // ===================== LOGOUT =====================
    async function logout() {
        await sb.auth.signOut();
        location.reload();
    }

    // ===================== SESSION =====================
    async function loadSession() {
        const { data: { session } } = await sb.auth.getSession();

        if (session?.user) {
            showUser(session.user);
        }
    }

    sb.auth.onAuthStateChange((event, session) => {
        if (session?.user) {
            showUser(session.user);
        }
    });

    window.addEventListener("load", loadSession);
</script>

</body>
</html>
